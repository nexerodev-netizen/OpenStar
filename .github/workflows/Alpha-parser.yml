name: Update Happ Subscriptions (Numbered & Clean)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Collect, Translate, Number and Merge
      run: |
        # 1. Создаем чистые временные файлы
        touch temp_white_raw.txt temp_black_raw.txt
        touch temp_combined_processed.txt
        touch temp_final_build.txt

        # --- ОБРАБОТКА WHITE СПИСКА ---
        echo "Скачиваю White источник от igareck..."
        url_white="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
        response_white=$(curl -sL -A "Mozilla/5.0" "$url_white")
        [[ "$response_white" =~ ^[A-Za-z0-9+/=]+$ ]] && response_white=$(echo -n "$response_white" | base64 -d 2>/dev/null || echo -n "$response_white")
        echo "$response_white" | grep -E -o '(vless|ss|trojan|vmess)://[^[:space:]]+' >> temp_white_raw.txt || true

        # --- ОБРАБОТКА BLACK СПИСКА ---
        echo "Скачиваю Black источник от igareck..."
        url_black="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt"
        response_black=$(curl -sL -A "Mozilla/5.0" "$url_black")
        [[ "$response_black" =~ ^[A-Za-z0-9+/=]+$ ]] && response_black=$(echo -n "$response_black" | base64 -d 2>/dev/null || echo -n "$response_black")
        echo "$response_black" | grep -E -o '(vless|ss|trojan|vmess)://[^[:space:]]+' >> temp_black_raw.txt || true

        # --- ОБРАБОТКА И НУМЕРАЦИЯ WHITE ---
        echo "Парсинг и нумерация White серверов..."
        # Ассоциативный массив для подсчета серверов каждой страны (нужен bash 4+)
        declare -A white_counters

        while IFS= read -r line; do
          if [[ "$line" == *#* ]]; then
            base_part="${line%%#*}"
            name_part="${line#*#}"
            
            # Извлекаем первые две буквы названия (код страны) и переводим в верхний регистр
            # Очищаем от мусора, оставляя только буквы в начале
            clean_code=$(echo "$name_part" | sed -E 's/[^a-zA-Z]//g' | head -c 2 | tr '[:lower:]' '[:upper:]')
            
            # Текстовый словарь для точного определения
            case "$clean_code" in
              RU) country="Россия" ;;
              DE) country="Германия" ;;
              NL) country="Нидерланды" ;;
              US) country="США" ;;
              FI) country="Финляндия" ;;
              FR) country="Франция" ;;
              GB|UK) country="Великобритания" ;;
              SE) country="Швеция" ;;
              PL) country="Польша" ;;
              KZ) country="Казахстан" ;;
              TR) country="Турция" ;;
              AE) country="ОАЭ" ;;
              SG) country="Сингапур" ;;
              HK) country="Гонконг" ;;
              CH) country="Швейцария" ;;
              JP) country="Япония" ;;
              *) country="${clean_code:-Сервер}" ;; # Если код неопознан, оставит сам двухбуквенный код
            esac

            # Инкрементируем счетчик для конкретной страны в списке white
            white_counters["$country"]=$(( ${white_counters["$country"]:-0} + 1 ))
            # Форматируем номер, чтобы было красиво (01, 02 вместо 1, 2)
            num=$(printf "%02d" "${white_counters["$country"]}")

            echo "${base_part}#${country} ${num} | white" >> temp_combined_processed.txt
          else
            echo "${line}#Неизвестно | white" >> temp_combined_processed.txt
          fi
        done < <(sort -u temp_white_raw.txt)

        # --- ОБРАБОТКА И НУМЕРАЦИЯ BLACK ---
        echo "Парсинг и нумерация Black серверов..."
        declare -A black_counters

        while IFS= read -r line; do
          if [[ "$line" == *#* ]]; then
            base_part="${line%%#*}"
            name_part="${line#*#}"
            
            clean_code=$(echo "$name_part" | sed -E 's/[^a-zA-Z]//g' | head -c 2 | tr '[:lower:]' '[:upper:]')
            
            case "$clean_code" in
              RU) country="Россия" ;;
              DE) country="Германия" ;;
              NL) country="Нидерланды" ;;
              US) country="США" ;;
              FI) country="Финляндия" ;;
              FR) country="Франция" ;;
              GB|UK) country="Великобритания" ;;
              SE) country="Швеция" ;;
              PL) country="Польша" ;;
              KZ) country="Казахстан" ;;
              TR) country="Турция" ;;
              AE) country="ОАЭ" ;;
              SG) country="Сингапур" ;;
              HK) country="Гонконг" ;;
              CH) country="Швейцария" ;;
              JP) country="Япония" ;;
              *) country="${clean_code:-Сервер}" ;;
            esac

            # Инкрементируем счетчик для конкретной страны в списке black
            black_counters["$country"]=$(( ${black_counters["$country"]:-0} + 1 ))
            num=$(printf "%02d" "${black_counters["$country"]}")

            echo "${base_part}#${country} ${num} | black" >> temp_combined_processed.txt
          else
            echo "${line}#Неизвестно | black" >> temp_combined_processed.txt
          fi
        done < <(sort -u temp_black_raw.txt)

        # --- СБОРКА ФИНАЛЬНОГО ФАЙЛА С МЕТАДАННЫМИ ---
        echo "#subscription-userinfo: upload=0; download=0; total=107374182400" >> temp_final_build.txt
        echo "# profile-update-interval: 1" >> temp_final_build.txt
        echo "# profile-title: Happ VPN Global" >> temp_final_build.txt
        echo "# annonce: Подписка Happ VPN обновлена. Баланс: 1000₽" >> temp_final_build.txt
        echo "" >> temp_final_build.txt

        cat temp_combined_processed.txt >> temp_final_build.txt

        # Сохранение результатов в репозиторий
        cp temp_final_build.txt sub.txt
        base64 -w 0 temp_final_build.txt > sub_base64.txt

        # --- СТРОГОЕ УДАЛЕНИЕ ВРЕМЕННЫХ ФАЙЛОВ ---
        rm -f temp_white_raw.txt temp_black_raw.txt temp_combined_processed.txt temp_final_build.txt
        echo "Все временные файлы успешно удалены."

    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add sub.txt sub_base64.txt
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Happ Sync (Numbered Format): $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
