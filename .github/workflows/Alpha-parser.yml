name: Update Happ Subscriptions (Split Lists & Safe Percent-Encoding)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Collect, Rename and Merge Configs
      run: |
        # Создаем временные файлы для сырых и обработанных данных
        touch temp_white_raw.txt temp_black_raw.txt
        touch temp_processed.txt
        touch final_sub.txt

        # --- 1. СБОР ИЗ WHITE.TXT ---
        if [ -f white.txt ]; then
          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^# ]] && continue
            response=$(curl -sL -A "Mozilla/5.0" "$url")
            [[ "$response" =~ ^[A-Za-z0-9+/=]+$ ]] && response=$(echo -n "$response" | base64 -d 2>/dev/null || echo -n "$response")
            echo "$response" | grep -E -o '(vless|ss|trojan|vmess)://[^[:space:]]+' >> temp_white_raw.txt || true
          done < white.txt
        fi

        # --- 2. СБОР ИЗ BLACK.TXT ---
        if [ -f black.txt ]; then
          while IFS= read -r url || [ -n "$url" ]; do
            [[ -z "$url" || "$url" =~ ^# ]] && continue
            response=$(curl -sL -A "Mozilla/5.0" "$url")
            [[ "$response" =~ ^[A-Za-z0-9+/=]+$ ]] && response=$(echo -n "$response" | base64 -d 2>/dev/null || echo -n "$response")
            echo "$response" | grep -E -o '(vless|ss|trojan|vmess)://[^[:space:]]+' >> temp_black_raw.txt || true
          done < black.txt
        fi

        # --- 3. БЕЗОПАСНАЯ ОБРАБОТКА WHITE (Сортировка уникальных и переименование) ---
        while IFS= read -r line; do
          if [[ "$line" == *#* ]]; then
            # Разделяем строку строго по первому знаку #, сохраняя все %число нетронутыми
            base_part="${line%%#*}"
            name_part="${line#*#}"
            # Обрезаем имя, но аккуратно, чтобы не порвать %-последовательность в конце
            short_name=$(echo -n "$name_part" | head -c 30)
            echo "${base_part}#Happ | White | ${short_name}" >> temp_processed.txt
          else
            echo "${line}#Happ | White_Server" >> temp_processed.txt
          fi
        done < <(sort -u temp_white_raw.txt)

        # --- 4. БЕЗОПАСНАЯ ОБРАБОТКА BLACK (Сортировка уникальных и переименование) ---
        while IFS= read -r line; do
          if [[ "$line" == *#* ]]; then
            base_part="${line%%#*}"
            name_part="${line#*#}"
            short_name=$(echo -n "$name_part" | head -c 30)
            echo "${base_part}#Happ | Black | ${short_name}" >> temp_processed.txt
          else
            echo "${line}#Happ | Black_Server" >> temp_processed.txt
          fi
        done < <(sort -u temp_black_raw.txt)

        # --- 5. СБОРКА И ПУБЛИКАЦИЯ ---
        # Шапка профиля
        echo "#subscription-userinfo: upload=0; download=0; total=107374182400" >> final_sub.txt
        echo "# profile-update-interval: 1" >> final_sub.txt
        echo "# profile-title: Happ VPN Global" >> final_sub.txt
        echo "# annonce: Подписка Happ VPN (Склеенная). Баланс: 1000₽" >> final_sub.txt
        echo "" >> final_sub.txt

        # Добавляем все обработанные прокси после шапки
        cat temp_processed.txt >> final_sub.txt

        # Сохраняем и делаем base64-версию
        cp final_sub.txt sub.txt
        base64 -w 0 final_sub.txt > sub_base64.txt

        # Чистим за собой временный мусор
        rm -f temp_white_raw.txt temp_black_raw.txt temp_processed.txt final_sub.txt

    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add sub.txt sub_base64.txt
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Happ Sync (White/Black Split): $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
